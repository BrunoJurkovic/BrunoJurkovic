<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 280" width="840" height="280">
  <defs>
    <radialGradient id="glow" cx="50%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#363a4f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#181926" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#363a4f"/>
    </pattern>
    <pattern id="scanlines" x="0" y="0" width="1" height="2" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#181926"/>
    </pattern>
    <filter id="mask-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <mask id="fade">
      <rect x="70" y="33" width="700" height="107" rx="20" fill="white" filter="url(#mask-soft)"/>
    </mask>
    <filter id="tglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="840" height="280" rx="12" fill="#181926"/>
  <rect width="840" height="280" rx="12" fill="url(#glow)"/>
  <rect width="840" height="280" rx="12" fill="url(#dots)" opacity="0.1"/>

  <g font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="9" mask="url(#fade)">
