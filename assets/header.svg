  <rect x="0" y="28" width="840" height="117" fill="url(#scanlines)" opacity="0.06"/>

  <line x1="252.0" y1="160" x2="588.0" y2="160" stroke="#8aadf4" stroke-width="0.5" opacity="0.15"/>

  <text x="420.0" y="198" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="38" font-weight="bold" fill="#8aadf4" opacity="0.2" filter="url(#tglow)">Bruno Jurković</text>
  <text x="420.0" y="198" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Menlo, Consolas, monospace" font-size="38" font-weight="bold" fill="#cad3f5">Bruno Jurković</text>

