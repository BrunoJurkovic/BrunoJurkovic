    <text x="50" y="80" fill="#9c9fee" opacity="0.97" xml:space="preserve">++++++++===========------------::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::------------=======+++++++****</text>
    <text x="50" y="93" fill="#a59bec" opacity="0.85" xml:space="preserve">****++++++++++========-----------::::::::::::::::::::::::::::::::::................................:::::::::::::::---------=======+++++++</text>
    <text x="50" y="106" fill="#ae96ea" opacity="0.72" xml:space="preserve">**********++++++++++=============---------------------------------:::::::::::::::::::::::::::::::::::::::---------------===============++</text>
    <text x="50" y="119" fill="#b792e8" opacity="0.60" xml:space="preserve">******+++++++++++++++++++===================================================================================+++++++++++++++++++++++++++++</text>
    <text x="50" y="132" fill="#be99ef" opacity="0.50" xml:space="preserve">=============================================+++++++++++++++++++++++++++++++********************************############****************+</text>
    <text x="50" y="145" fill="#c6a0f6" opacity="0.50" xml:space="preserve">::::::::::::::::::::::-------------------================+++++++++++++++***************###########################################*******</text>
